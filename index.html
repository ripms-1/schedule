<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo's Personal App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #262626;
  --border2: #303030;
  --text: #ececec;
  --text2: #888;
  --text3: #555;
}
html,body { height:100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.layout {
  display: grid;
  grid-template-columns: 236px 1fr;
  min-height: 100vh;
  max-width: 1080px;
  margin: 0 auto;
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.clock { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
.clock-date { font-size: 11px; color: var(--text2); margin-top: 5px; }
.sb-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.day-nav { display: flex; flex-direction: column; gap: 1px; }
.day-btn {
  background: transparent; border: none; color: var(--text3);
  font-family: 'Inter', sans-serif; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; cursor: pointer;
  text-align: left; transition: all 0.12s;
  display: flex; align-items: center; justify-content: space-between;
}
.day-btn:hover { background: var(--surface); color: var(--text2); }
.day-btn.active { background: var(--surface2); color: var(--text); font-weight: 500; }
.today-dot { width:5px; height:5px; border-radius:50%; background:var(--text3); }
.sleep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.sleep-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.sleep-lbl { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
.sleep-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); font-weight: 500; }
.anchor-list { display: flex; flex-direction: column; gap: 5px; }
.anchor-row {
  display: grid; grid-template-columns: 14px 1fr 16px;
  gap: 8px; align-items: center;
  padding: 8px 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
}
.anchor-icon { font-size: 11px; }
.anchor-inp {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; width: 100%;
}
.anchor-inp::placeholder { color: var(--text3); }
.chk {
  width:15px; height:15px; border-radius:4px; border:1px solid var(--border2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:9px; color:transparent; transition:all 0.12s; background:transparent; flex-shrink:0;
}
.chk.done { background:var(--text); border-color:var(--text); color:#000; font-weight:700; }
.ram-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; }
.ram-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.ram-num { font-family:'JetBrains Mono',monospace; font-size:28px; color:var(--text); line-height:1; }
.ram-of { font-size:11px; color:var(--text3); }
.ram-right { font-size:11px; color:var(--text2); }
.ram-bar { height:2px; background:var(--border2); border-radius:1px; overflow:hidden; margin-bottom:8px; }
.ram-fill { height:100%; background:var(--text2); border-radius:1px; transition:width 0.5s; }
.ram-prayer { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; line-height:1.6; }

/* MAIN */
.main { padding: 28px 32px; }
.main-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
.main-title { font-size:18px; font-weight:600; color:var(--text); }
.main-sub { font-size:12px; color:var(--text2); margin-top:3px; }
.now-pill {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:5px 12px;
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2);
  white-space:nowrap;
}

/* TIMELINE */
.timeline { display:flex; flex-direction:column; }
.tl-block {
  display:grid; grid-template-columns:68px 1px 1fr;
  gap:0 14px; min-height:52px;
  transition:opacity 0.25s;
}
.tl-block.past { opacity:0.28; }
.tl-block.current { opacity:1; }
.tl-block.future { opacity:0.75; }
.tl-time {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:var(--text3); padding-top:17px; text-align:right;
}
.tl-block.current .tl-time { color:var(--text2); }
.tl-spine { display:flex; flex-direction:column; align-items:center; }
.tl-dot {
  width:6px; height:6px; border-radius:50%; background:var(--border2);
  margin-top:19px; flex-shrink:0; z-index:1; position:relative; transition:background 0.2s;
}
.tl-block.current .tl-dot { background:var(--text); box-shadow:0 0 0 3px rgba(255,255,255,0.07); }
.tl-line { width:1px; flex:1; background:var(--border); margin-top:2px; }
.tl-block:last-child .tl-line { display:none; }
.tl-body { padding:11px 0 14px; }
.tl-tag { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:2px; }
.tl-block.current .tl-tag { color:var(--text2); }
.tl-title { font-size:13px; font-weight:500; color:var(--text2); }
.tl-block.current .tl-title { color:var(--text); font-weight:600; }
.tl-note { font-size:11px; color:var(--text3); margin-top:2px; line-height:1.5; }

/* NOW LINE */
.now-indicator {
  display:grid; grid-template-columns:68px 1px 1fr;
  gap:0 14px; align-items:center; pointer-events:none; margin:-4px 0;
}
.now-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text); text-align:right; }
.now-dot-wrap { display:flex; align-items:center; justify-content:center; }
.now-dot { width:8px; height:8px; border-radius:50%; background:var(--text); box-shadow:0 0 0 2px #0a0a0a, 0 0 0 4px rgba(255,255,255,0.12); }
.now-bar-line { height:1px; background:rgba(255,255,255,0.2); }

/* NOTES */
.notes-section { margin-top:32px; padding-top:20px; border-top:1px solid var(--border); }
.notes-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.notes-area {
  background:transparent; border:none; outline:none;
  color:var(--text2); font-family:'Inter',sans-serif;
  font-size:13px; width:100%; resize:none; min-height:64px; line-height:1.7;
}
.notes-area::placeholder { color:var(--text3); }

/* TABS */
.tabs { display:flex; gap:2px; margin-bottom:24px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:3px; }
.tab-btn { flex:1; background:transparent; border:none; color:var(--text3); font-family:'Inter',sans-serif; font-size:12px; font-weight:500; padding:6px 10px; border-radius:6px; cursor:pointer; transition:all 0.15s; }
.tab-btn:hover { color:var(--text2); }
.tab-btn.active { background:var(--surface2); color:var(--text); }
.canvas-panel { display:none; }
.canvas-panel.visible { display:block; }
.schedule-panel.hidden { display:none; }
.token-setup { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
.token-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
.token-sub { font-size:12px; color:var(--text2); margin-bottom:14px; line-height:1.5; }
.token-row { display:flex; gap:8px; }
.token-inp { flex:1; background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px 12px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; outline:none; }
.token-inp::placeholder { color:var(--text3); }
.token-inp:focus { border-color:var(--text3); }
.btn { background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px 14px; color:var(--text2); font-family:'Inter',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.btn:hover { color:var(--text); border-color:var(--text3); }
.btn.primary { background:var(--text); color:#000; border-color:var(--text); font-weight:600; }
.btn.primary:hover { background:#ccc; }
.canvas-status { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); margin-top:10px; min-height:16px; }
.canvas-status.ok { color:#4ade80; }
.canvas-status.err { color:#f87171; }
.assignments-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.assignments-title { font-size:13px; font-weight:600; color:var(--text); }
.refresh-btn { background:transparent; border:1px solid var(--border); border-radius:5px; padding:4px 10px; color:var(--text3); font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; transition:all 0.15s; }
.refresh-btn:hover { color:var(--text2); border-color:var(--border2); }
.course-section { margin-bottom:24px; }
.course-name { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.assignment-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:6px; transition:border-color 0.15s; }
.assignment-card:hover { border-color:var(--border2); }
.assignment-card.done-card { opacity:0.35; }
.asgn-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.asgn-left { display:flex; gap:10px; align-items:flex-start; flex:1; }
.asgn-check { width:15px; height:15px; border-radius:4px; border:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; color:transparent; background:transparent; transition:all 0.12s; flex-shrink:0; margin-top:2px; }
.asgn-check.done { background:var(--text); border-color:var(--text); color:#000; font-weight:700; }
.asgn-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; }
.asgn-due { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); white-space:nowrap; margin-top:2px; flex-shrink:0; }
.asgn-due.urgent { color:#f87171; }
.asgn-due.soon { color:#fb923c; }
.asgn-summary { font-size:12px; color:var(--text2); margin-top:10px; line-height:1.6; display:none; border-top:1px solid var(--border); padding-top:10px; }
.asgn-summary.visible { display:block; }
.asgn-summary.loading { color:var(--text3); font-style:italic; display:block; }
.summarize-btn { background:transparent; border:1px solid var(--border); border-radius:5px; padding:4px 10px; color:var(--text3); font-family:'Inter',sans-serif; font-size:11px; cursor:pointer; transition:all 0.12s; margin-top:8px; display:inline-block; }
.summarize-btn:hover { color:var(--text2); border-color:var(--border2); }
.empty-state { text-align:center; padding:40px 20px; color:var(--text3); font-size:13px; }

@media (max-width:640px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
  .main { padding:20px 16px; }
}

/* ── CALENDAR VIEWS ─────────────────────────────────────────── */
.view-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{flex:1;background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.view-btn:hover{color:var(--text2);}
.view-btn.active{background:var(--surface2);color:var(--text);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-title{font-size:14px;font-weight:600;color:var(--text);}
.cal-nav-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:13px;padding:4px 10px;cursor:pointer;transition:all 0.12s;}
.cal-nav-btn:hover{color:var(--text2);border-color:var(--border2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.cal-dow{background:var(--surface);padding:7px 4px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.cal-day{background:var(--bg);min-height:68px;padding:5px 4px;cursor:pointer;transition:background 0.1s;overflow:hidden;}
.cal-day:hover{background:var(--surface);}
.cal-day.other-month{opacity:0.25;}
.cal-day.today{background:var(--surface2);}
.cal-day.today .cal-dn{color:var(--text);font-weight:700;}
.cal-day.selected{outline:1px solid var(--text3);outline-offset:-1px;}
.cal-dn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:3px;}
.cal-dot{font-size:9px;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--surface2);border-radius:3px;padding:1px 3px;margin-bottom:2px;display:block;}
.cal-dot.u{color:#f87171;background:rgba(248,113,113,0.1);}
.cal-dot.s{color:#fb923c;background:rgba(251,146,60,0.08);}
.cal-more{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.day-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;display:none;}
.day-panel.on{display:block;}
.day-panel-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em;}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-nav-title{font-size:13px;font-weight:600;color:var(--text);}
.week-cols{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.week-col-hdr{text-align:center;margin-bottom:8px;}
.week-dow{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;}
.week-num{font-family:'JetBrains Mono',monospace;font-size:17px;color:var(--text2);line-height:1;margin-top:2px;}
.week-col.is-today .week-num{color:var(--text);font-weight:700;}
.week-col.is-today .week-dow{color:var(--text2);}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 7px;margin-bottom:4px;cursor:pointer;transition:border-color 0.12s;}
.week-card:hover{border-color:var(--border2);}
.week-card-name{font-size:11px;color:var(--text2);line-height:1.3;}
.week-card-course{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;}
.week-card.u .week-card-name{color:#f87171;}
.week-card.s .week-card-name{color:#fb923c;}
.week-empty{font-size:10px;color:var(--text3);text-align:center;padding:10px 0;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">Solo's App</div>
    <div>
      <div class="clock" id="clock">--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
    <div>
      <div class="sb-label">days</div>
      <div class="day-nav" id="dayNav"></div>
    </div>
    <div>
      <div class="sb-label">sleep target</div>
      <div class="sleep-grid">
        <div class="sleep-card"><div class="sleep-lbl">bed</div><div class="sleep-val" id="bedTime">—</div></div>
        <div class="sleep-card"><div class="sleep-lbl">wake</div><div class="sleep-val" id="wakeTime">—</div></div>
      </div>
    </div>
    <div>
      <div class="sb-label">three anchors</div>
      <div class="anchor-list">
        <div class="anchor-row"><span class="anchor-icon">📚</span><input class="anchor-inp" id="a1" placeholder="school..." /><div class="chk" id="c1" onclick="tog(1)"></div></div>
        <div class="anchor-row"><span class="anchor-icon">💪</span><input class="anchor-inp" id="a2" placeholder="body..." /><div class="chk" id="c2" onclick="tog(2)"></div></div>
        <div class="anchor-row"><span class="anchor-icon">🎮</span><input class="anchor-inp" id="a3" placeholder="for you..." /><div class="chk" id="c3" onclick="tog(3)"></div></div>
      </div>
    </div>
    <div>
      <div class="sb-label">ramadan 1447</div>
      <div class="ram-card">
        <div class="ram-top">
          <div><span class="ram-num" id="ramNum">—</span><span class="ram-of"> / 30</span></div>
          <div class="ram-right"><span id="ramLeft">—</span> left</div>
        </div>
        <div class="ram-bar"><div class="ram-fill" id="ramFill"></div></div>
        <div class="ram-prayer" id="ramPrayer">—</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-hdr">
      <div>
        <div class="main-title" id="mainTitle">—</div>
        <div class="main-sub" id="mainSub">—</div>
      </div>
      <div class="now-pill" id="nowPill">—</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabSchedule" onclick="switchTab('schedule')">Schedule</button>
      <button class="tab-btn" id="tabCanvas" onclick="switchTab('canvas')">Assignments</button>
    </div>
    <div class="schedule-panel" id="schedulePanel">
      <div class="timeline" id="timeline"></div>
      <div class="notes-section">
        <div class="notes-lbl">notes / brain dump</div>
        <textarea class="notes-area" id="notes" placeholder="calc steps to remember, thoughts, anything..." rows="4"></textarea>
      </div>
    </div>
    <div class="canvas-panel" id="canvasPanel">
      <div class="view-tabs">
        <button class="view-btn active" id="vbList" onclick="setView('list')">List</button>
        <button class="view-btn" id="vbWeek" onclick="setView('week')">Week</button>
        <button class="view-btn" id="vbMonth" onclick="setView('month')">Month</button>
      </div>
      <div class="canvas-status" id="canvasStatus" style="margin-bottom:10px;font-family:JetBrains Mono,monospace;font-size:11px;color:#555;"></div>
      <div id="tokenSetup" style="display:none;"></div>
      <div id="assignmentsArea"></div>
    </div>
  </main>
</div>

<script>
// ── PRAYER TIMES ─────────────────────────────────────────────────────────────
const PT = {
  15:{fIq:'5:40 AM',mg:'6:08 PM',iIq:'8:00 PM',te:'9:30 PM'},
  16:{fIq:'5:40 AM',mg:'6:09 PM',iIq:'8:00 PM',te:'9:30 PM'},
  17:{fIq:'5:40 AM',mg:'6:10 PM',iIq:'8:00 PM',te:'9:30 PM'},
  18:{fIq:'5:40 AM',mg:'6:11 PM',iIq:'8:00 PM',te:'9:30 PM'},
  19:{fIq:'6:30 AM',mg:'7:12 PM',iIq:'8:45 PM',te:'10:15 PM'},
  20:{fIq:'6:30 AM',mg:'7:13 PM',iIq:'8:45 PM',te:'10:15 PM'},
  21:{fIq:'6:30 AM',mg:'7:14 PM',iIq:'8:45 PM',te:'10:15 PM'},
  22:{fIq:'6:30 AM',mg:'7:15 PM',iIq:'8:45 PM',te:'10:15 PM'},
  23:{fIq:'6:30 AM',mg:'7:16 PM',iIq:'8:45 PM',te:'10:15 PM'},
  24:{fIq:'6:30 AM',mg:'7:17 PM',iIq:'8:45 PM',te:'10:15 PM'},
  25:{fIq:'6:30 AM',mg:'7:18 PM',iIq:'8:45 PM',te:'10:15 PM'},
  26:{fIq:'6:30 AM',mg:'7:19 PM',iIq:'8:45 PM',te:'10:15 PM'},
  27:{fIq:'6:30 AM',mg:'7:19 PM',iIq:'8:45 PM',te:'10:15 PM'},
  28:{fIq:'6:30 AM',mg:'7:20 PM',iIq:'8:45 PM',te:'10:15 PM'},
  29:{fIq:'6:30 AM',mg:'7:21 PM',iIq:'8:45 PM',te:'10:15 PM'},
  30:{fIq:'6:30 AM',mg:'7:22 PM',iIq:'8:45 PM',te:'10:15 PM'},
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function parseMin(str) {
  if (!str) return null;
  const [time, period] = str.split(' ');
  let [h,m] = time.split(':').map(Number);
  if (period==='PM' && h!==12) h+=12;
  if (period==='AM' && h===12) h=0;
  return h*60+m;
}
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function fmtClock(d) {
  let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}
function getRamDay() {
  const start=new Date('2026-02-18'); const today=new Date();
  start.setHours(0,0,0,0); today.setHours(0,0,0,0);
  return Math.min(Math.max(Math.floor((today-start)/86400000)+1,15),30);
}

// ── SCHEDULE BUILDER ──────────────────────────────────────────────────────────
function buildSched(day, rd) {
  const p = PT[rd]||PT[15];
  const isTuTh = day==='tuesday'||day==='thursday';
  const isFri=day==='friday', isSat=day==='saturday', isSun=day==='sunday';
  const wake = (isFri||isSat||isSun) ? '9:00 AM' : '8:30 AM';
  const bed  = isSat ? '2:00 AM' : isFri ? '1:30 AM' : isSun ? '1:00 AM' : '12:30 AM';
  let blocks=[];
  blocks.push({time:wake, end:p.fIq, tag:'morning', title:'Wake up + Fajr 🌅', note:`Fajr iqama ${p.fIq}`});
  if (isFri) {
    blocks.push({time:p.fIq, end:'12:00 PM', tag:'free', title:'Free time', note:'no campus — rest, fortnite, whatever'});
    blocks.push({time:'12:00 PM', end:'1:30 PM', tag:"jumu'ah", title:"Jumu'ah 🕌", note:'Dhuhr iqama 12:35 PM'});
    blocks.push({time:'1:30 PM', end:p.mg, tag:'free', title:'Free time', note:'workout, fortnite, chill'});
  } else if (isSat) {
    blocks.push({time:p.fIq, end:'1:00 PM', tag:'free', title:'Free time', note:'no obligations — sleep in, chill'});
    blocks.push({time:'1:00 PM', end:'3:30 PM', tag:'study', title:'Optional calc review', note:'only if you feel it'});
    blocks.push({time:'3:30 PM', end:p.mg, tag:'free', title:'Free time', note:'fortnite, errands, whatever'});
  } else if (isSun) {
    blocks.push({time:p.fIq, end:'11:00 AM', tag:'study', title:'Calc reset', note:'review the week · prep for Monday'});
    blocks.push({time:'11:00 AM', end:p.mg, tag:'free', title:'Free time', note:'genuinely rest'});
  } else if (day==='monday'||day==='wednesday') {
    blocks.push({time:p.fIq, end:'11:30 AM', tag:'study', title:'Calc window', note:'morning brain is sharpest — problems from scratch'});
    blocks.push({time:'11:30 AM', end:'1:00 PM', tag:'home', title:'Errands / home', note:'whatever comes up'});
    blocks.push({time:'1:00 PM', end:p.mg, tag:'free', title:'Free time', note:'your window — use it how you need'});
  } else {
    blocks.push({time:p.fIq, end:'11:30 AM', tag:'study', title:day==='tuesday'?'Calc review before class':'Calc prep', note:day==='tuesday'?'redo last session before class — locks it in':'review before class'});
    blocks.push({time:'11:30 AM', end:'12:40 PM', tag:'transit', title:'Head to campus', note:''});
    blocks.push({time:'12:40 PM', end:'3:10 PM', tag:'calc · mth 004', title:'Calculus', note:'in-person · be present'});
    blocks.push({time:'3:10 PM', end:p.mg, tag:'free', title:'Free time', note:'redo problems while fresh, or just decompress'});
  }
  blocks.push({time:p.mg, end:p.iIq, tag:'maghrib · iftar', title:'Iftar + Maghrib 🌙', note:`break fast at ${p.mg}`});
  if (isSat) {
    blocks.push({time:p.iIq, end:'11:30 PM', tag:'taraweeh + friends', title:'Isha + Taraweeh — MCA 🕌', note:`iqama ${p.iIq} · hang with friends after`});
    blocks.push({time:'11:30 PM', end:bed, tag:'night', title:'Night wind down', note:'home, decompress'});
  } else if (isFri) {
    blocks.push({time:p.iIq, end:'10:30 PM', tag:'taraweeh', title:'Isha + Taraweeh — MCA 🕌', note:`iqama ${p.iIq}`});
    blocks.push({time:'10:30 PM', end:bed, tag:'night', title:'Night wind down', note:'home, decompress'});
  } else {
    blocks.push({time:p.iIq, end:p.te, tag:'taraweeh', title:'Isha + Taraweeh — MCA 🕌', note:`iqama ${p.iIq}${isTuTh?' · leave campus by '+(rd>=19?'8:15 PM':'7:30 PM'):''}`});
    blocks.push({time:p.te, end:'10:00 PM', tag:'home', title:'Back home', note:'aim 9–9:30 PM'});
    blocks.push({time:'10:00 PM', end:bed, tag:'night', title:'Night wind down', note:'game, decompress'});
  }
  blocks.push({time:bed, end:null, tag:'sleep', title:'Bed 🌙', note:`→ wake ${wake}`});
  return {sleep:{bed,wake}, blocks, p};
}

  day: DAYS[new Date().getDay()],

  anchors: ['','',''],

function loadS() { try { const s=sessionStorage.getItem('sched3'); if(s) Object.assign(S,JSON.parse(s)); } catch(e){} }

function buildNav() {
  const nav=document.getElementById('dayNav'); nav.innerHTML='';

  ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'].forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===S.day?' active':'');

    btn.onclick=()=>setDay(d);
    nav.appendChild(btn);
  });
}
function setDay(d) { S.day=d; saveS(); buildNav(); renderMain(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMain() {
  const sched=buildSched(S.day, S.ramDay);
  const todayName=DAYS[new Date().getDay()];
  const isToday=S.day===todayName;
  const now=new Date();

  document.getElementById('mainTitle').textContent=DLBL[S.day]+(isToday?' · Today':'');
  document.getElementById('mainSub').textContent=`${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('bedTime').textContent=sched.sleep.bed;
  document.getElementById('wakeTime').textContent=sched.sleep.wake;

  renderTimeline(sched.blocks, isToday);
}

function renderTimeline(blocks, isToday) {
  const c=document.getElementById('timeline'); c.innerHTML='';
  const nm=isToday?nowMin():-1;
  let insertedNow=false;

  blocks.forEach((b,i)=>{
    const sMin=parseMin(b.time);
    const eMin=b.end?parseMin(b.end):null;
    let cls='future';
    if(isToday){
      if(eMin!==null && nm>=eMin) cls='past';
      else if(nm>=sMin) cls='current';
    }

    // Insert now line before current block
    if(isToday && cls==='current' && !insertedNow){
      insertedNow=true;
      const nl=document.createElement('div');
      nl.className='now-indicator'; nl.id='nowIndicator';
      nl.innerHTML=`<div class="now-lbl" id="nowLbl">${fmtClock(new Date())}</div><div class="now-dot-wrap"><div class="now-dot"></div></div><div class="now-bar-line"></div>`;
      c.appendChild(nl);
    }

    const row=document.createElement('div');
    row.className=`tl-block ${cls}`;
    row.innerHTML=`
      <div class="tl-time">${b.time}</div>
      <div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="tl-body">
        <div class="tl-tag">${b.tag}</div>
        <div class="tl-title">${b.title}</div>
        ${b.note?`<div class="tl-note">${b.note}</div>`:''}
      </div>`;
    c.appendChild(row);
  });
}

  const now=new Date();

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function renderMonth(events) {
  const area = document.getElementById('assignmentsArea');
  const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // Build lookup: date string -> assignments
  const byDate = {};
  events.forEach(e => { if(!byDate[e.due]) byDate[e.due]=[]; byDate[e.due].push(e); });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  let html = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="shiftMonth(-1)">←</button>
      <div class="cal-nav-title">${MONTHS_LONG[calMonth]} ${calYear}</div>
      <button class="cal-nav-btn" onclick="shiftMonth(1)">→</button>
    </div>
    <div class="day-panel" id="dayPanel"><div class="day-panel-title" id="dayPanelTitle"></div><div id="dayPanelItems"></div></div>
    <div class="cal-grid">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  // Prev month fill
  for(let i=0; i<firstDay; i++) {
    const d = daysInPrev - firstDay + 1 + i;
    html += `<div class="cal-day other-month"><div class="cal-dn">${d}</div></div>`;
  }

  for(let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const asgns = byDate[ds] || [];
    const isToday = ds===todayStr;
    const isSel = ds===selectedDay;
    const classes = ['cal-day', isToday?'today':'', isSel?'selected':''].filter(Boolean).join(' ');
    let dots = '';
    asgns.slice(0,2).forEach(a => {
      const due = new Date(a.due+'T23:59:00');
      const days = Math.ceil((due-now)/86400000);
      const cls = days<=0?'u':days<=3?'s':'';
      dots += `<span class="cal-dot ${cls}">${a.name.substring(0,14)}</span>`;
    });
    if(asgns.length>2) dots += `<div class="cal-more">+${asgns.length-2} more</div>`;
    html += `<div class="${classes}" onclick="selectDay('${ds}')" ><div class="cal-dn">${d}</div>${dots}</div>`;
  }

  // Next month fill
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i=1; i<=remaining; i++) {
    html += `<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  }

  html += `</div>`;
  area.innerHTML = html;

  // Restore selected day panel if any
  if(selectedDay) showDayPanel(selectedDay, events);
}

function shiftMonth(dir) {
  calMonth += dir;
  if(calMonth > 11) { calMonth=0; calYear++; }
  if(calMonth < 0) { calMonth=11; calYear--; }
  renderMonth(getFilteredEvents());
}

function selectDay(ds) {
  selectedDay = selectedDay===ds ? null : ds;
  renderMonth(getFilteredEvents());
}

function showDayPanel(ds, events) {
  const panel = document.getElementById('dayPanel');
  const title = document.getElementById('dayPanelTitle');
  const items = document.getElementById('dayPanelItems');
  if(!panel) return;
  const asgns = events.filter(e=>e.due===ds);
  if(!asgns.length || !selectedDay) { panel.classList.remove('on'); return; }
  const d = new Date(ds+'T12:00:00');
  title.textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const doneSet = JSON.parse(sessionStorage.getItem('doneAsgn')||'{}');
  items.innerHTML = asgns.map(a => {
    const safeId = a.id.replace(/[^a-zA-Z0-9]/g,'_');
    const isDone = doneSet[a.id]||false;
    return `<div class="assignment-card${isDone?' done-card':''}" id="card-${safeId}" style="margin-bottom:6px;">
      <div class="asgn-top">
        <div class="asgn-left">
          <div class="asgn-check${isDone?' done':''}" id="chk-${safeId}" onclick="toggleDone('${safeId}')">${isDone?'✓':''}</div>
          <div>
            <div class="asgn-name">${a.name}</div>

      <button class="summarize-btn" style="margin-top:6px;" id="sumbtn-${safeId}" onclick="summarize('${safeId}')">✦ summarize</button>
    </div>`;
  }).join('');

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function renderWeek(events) {
  const area = document.getElementById('assignmentsArea');
  const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // Get start of current week (Sunday) + offset
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay() + weekOffset*7);
  startOfWeek.setHours(0,0,0,0);

  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate()+6);

  const weekLabel = `${MONTHS_SHORT[startOfWeek.getMonth()]} ${startOfWeek.getDate()} – ${MONTHS_SHORT[endOfWeek.getMonth()]} ${endOfWeek.getDate()}`;

  // Build lookup
  const byDate = {};
  events.forEach(e => { if(!byDate[e.due]) byDate[e.due]=[]; byDate[e.due].push(e); });

  const days = [];
  for(let i=0;i<7;i++) {
    const d = new Date(startOfWeek);
    d.setDate(startOfWeek.getDate()+i);
    days.push(d);
  }

  const doneSet = JSON.parse(sessionStorage.getItem('doneAsgn')||'{}');

  let cols = days.map(d => {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const asgns = byDate[ds]||[];
    const isToday = ds===todayStr;
    const cards = asgns.length ? asgns.map(a => {
      const due = new Date(a.due+'T23:59:00');
      const daysLeft = Math.ceil((due-now)/86400000);
      const cls = daysLeft<=0?'u':daysLeft<=3?'s':'';
      const safeId = a.id.replace(/[^a-zA-Z0-9]/g,'_');
      const isDone = doneSet[a.id]||false;
      return `<div class="week-card ${cls}${isDone?' done-card':''}" id="card-${safeId}">
        <div style="display:flex;align-items:flex-start;gap:6px;">
          <div class="asgn-check${isDone?' done':''}" id="chk-${safeId}" onclick="toggleDone('${safeId}')" style="margin-top:1px;flex-shrink:0;">${isDone?'✓':''}</div>
          <div>
            <div class="week-card-name">${a.name}</div>
            <div class="week-card-course">${a.course}</div>
          </div>
        </div>
        ${a.desc?`<button class="summarize-btn" style="margin-top:6px;" id="sumbtn-${safeId}" onclick="summarize('${safeId}')" >✦</button>`:''}
        <div class="asgn-summary" id="sum-${safeId}"></div>
      </div>`;
    }).join('') : `<div class="week-empty">—</div>`;

    return `<div class="week-col${isToday?' is-today':''}">
      <div class="week-col-hdr">
        <div class="week-dow">${DOWS[d.getDay()]}</div>
        <div class="week-num">${d.getDate()}</div>
      </div>
      ${cards}
    </div>`;
  }).join('');

  area.innerHTML = `
    <div class="week-nav">
      <button class="cal-nav-btn" onclick="shiftWeek(-1)">←</button>
      <div class="week-nav-title">${weekLabel}</div>
      <button class="cal-nav-btn" onclick="shiftWeek(1)">→</button>
    </div>
    <div class="week-cols">${cols}</div>`;
}

async function fetchWithProxy(url) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), {signal: AbortSignal.timeout(8000)});
      if (res.ok) {
        const text = await res.text();
        if (text.includes('VCALENDAR')) return text;
      }
    } catch(e) { continue; }
  }
  throw new Error('all proxies failed');
}

window._liveAssignments = null;

async function fetchLiveAssignments() {
  if (window._liveAssignments !== null) return; // already fetched this session
  try {
    const PROXY = 'https://soln0m-proxy.solomon02162007.workers.dev';
    const coursesRes = await fetch(`${PROXY}/canvas/courses?enrollment_state=active&per_page=20`);
    if (!coursesRes.ok) return;
    const courses = await coursesRes.json();
    let all = [];
    await Promise.all(courses.map(async (c) => {
      try {
        const r = await fetch(`${PROXY}/canvas/courses/${c.id}/assignments?bucket=upcoming&per_page=30&order_by=due_at`);
        if (!r.ok) return;
        const asgns = await r.json();
        asgns.forEach(a => {
          if (a.due_at) {
            const parts = c.name.split(/[-\s]/);
            const course = parts.length >= 2 ? `${parts[0]}-${parts[1]}` : c.name.substring(0,12);
            const desc = (a.description||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim().substring(0,300);
            all.push({ id: String(a.id), name: a.name, course, due: a.due_at.slice(0,10), desc });
          }
        });
      } catch(e) {}
    }));
    all.sort((a,b) => new Date(a.due) - new Date(b.due));
    window._liveAssignments = all;
    // Update ASGN_MAP
    all.forEach(a => { ASGN_MAP[a.id.replace(/[^a-zA-Z0-9]/g,'_')] = a; });
  } catch(e) {
    window._liveAssignments = null;
  }
}

function getLiveOrEmbedded() {
  const now = new Date();
  const src = window._liveAssignments || CANVAS_DATA;
  return src.filter(e => new Date(e.due+'T23:59:00') >= now);
}

async function loadCanvas() {
  const area = document.getElementById('assignmentsArea');
  const status = document.getElementById('canvasStatus');
  document.getElementById('tokenSetup').style.display = 'none';

  if (currentView === 'month' || currentView === 'week') {
    await fetchLiveAssignments();
    const events = getLiveOrEmbedded();
    if (currentView === 'month') renderMonth(events);
    else renderWeek(events);
    return;
  }

  // List view — try live Canvas first, fall back to embedded data
  status.textContent = 'syncing canvas...';
  status.className = 'canvas-status';
  area.innerHTML = '<div class="empty-state">loading...</div>';

  try {
    const PROXY = 'https://soln0m-proxy.solomon02162007.workers.dev';
    const now = new Date();

    // Fetch active courses
    const coursesRes = await fetch(`${PROXY}/canvas/courses?enrollment_state=active&per_page=20`);
    if (!coursesRes.ok) throw new Error('courses fetch failed');
    const courses = await coursesRes.json();

    // Fetch upcoming assignments for each course
    let all = [];
    await Promise.all(courses.map(async (c) => {
      try {
        const r = await fetch(`${PROXY}/canvas/courses/${c.id}/assignments?bucket=upcoming&per_page=30&order_by=due_at`);
        if (!r.ok) return;
        const asgns = await r.json();
        asgns.forEach(a => {
          if (a.due_at) {
            const parts = c.name.split(/[-\s]/);
            const course = parts.length >= 2 ? `${parts[0]}-${parts[1]}` : c.name.substring(0,12);
            const desc = (a.description||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim().substring(0,300);
            all.push({
              id: String(a.id),
              name: a.name,
              course: course,
              due: a.due_at.slice(0,10),
              desc: desc
            });
          }
        });
      } catch(e) {}
    }));

    all.sort((a,b) => new Date(a.due) - new Date(b.due));

    // Update CANVAS_DATA-like structure in memory
    window._liveAssignments = all;

    // Rebuild ASGN_MAP with live data
    all.forEach(a => {
      const safeId = a.id.replace(/[^a-zA-Z0-9]/g,'_');
      ASGN_MAP[safeId] = a;
    });

    const upcoming = all.filter(e => new Date(e.due+'T23:59:00') >= now);
    renderAssignments_embed(upcoming, status, area);
    status.textContent = `✓ live sync · ${upcoming.length} assignments`;
    status.className = 'canvas-status ok';

  } catch(err) {
    console.log('Live Canvas failed, using embedded data:', err.message);
    // Fall back to embedded CANVAS_DATA
    const events = getFilteredEvents();
    renderAssignments_embed(events, status, area);
    status.textContent = `embedded data · ${events.length} assignments`;
    status.className = 'canvas-status';
  }
}


function renderAssignments_embed(events, status, area) {
  const now = new Date();
  if (!events.length) { area.innerHTML='<div class="empty-state">no upcoming assignments 🎉</div>'; return; }
  const byCourse = {};
  events.forEach(e => { if(!byCourse[e.course]) byCourse[e.course]=[]; byCourse[e.course].push(e); });
  area.innerHTML='';
  const hdr=document.createElement('div'); hdr.className='assignments-header';
  hdr.innerHTML=`<div class="assignments-title">${events.length} upcoming</div><div style="font-family:JetBrains Mono,monospace;font-size:10px;color:#555;">synced Mar 5</div>`;
  area.appendChild(hdr);
  const doneSet=JSON.parse(sessionStorage.getItem('doneAsgn')||'{}');
  Object.entries(byCourse).forEach(([course,asgns])=>{
    const sec=document.createElement('div'); sec.className='course-section';
    sec.innerHTML=`<div class="course-name">${course}</div>`;
    asgns.forEach(a=>{
      const due=new Date(a.due+'T23:59:00');
      const days=Math.ceil((due-now)/86400000);
      const dueFmt=due.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const dueClass=days<=0?'urgent':days<=3?'soon':'';
      const daysLabel=days<=0?'today':days===1?'tomorrow':`${days}d`;
      const isDone=doneSet[a.id]||false;
      const safeId=a.id.replace(/[^a-zA-Z0-9]/g,'_');
      const card=document.createElement('div');
      card.className=`assignment-card${isDone?' done-card':''}`;
      card.id=`card-${safeId}`;
      const descBtn = a.desc ? `<button class="summarize-btn" id="sumbtn-${safeId}" onclick="summarize('${safeId}')" >✦ summarize</button>` : '';
      card.innerHTML=`
        <div class="asgn-top">
          <div class="asgn-left">
            <div class="asgn-check${isDone?' done':''}" id="chk-${safeId}" onclick="toggleDone('${safeId}')">${isDone?'✓':''}</div>
            <div class="asgn-name">${a.name}</div>
          </div>
          <div class="asgn-due ${dueClass}">${daysLabel}<br>${dueFmt}</div>
        </div>
        <div class="asgn-summary" id="sum-${safeId}"></div>
        ${descBtn}`;
      sec.appendChild(card);
    });
    area.appendChild(sec);
  });
  if(status){ status.textContent=`✓ ${events.length} assignments loaded`; status.className='canvas-status ok'; }
}

function toggleDone(id) {
  const done = JSON.parse(sessionStorage.getItem('doneAsgn')||'{}');
  done[id] = !done[id];
  sessionStorage.setItem('doneAsgn', JSON.stringify(done));
  const chk = document.getElementById(`chk-${id}`);
  const card = document.getElementById(`card-${id}`);
  chk.classList.toggle('done',done[id]); chk.textContent=done[id]?'✓':'';
  card.classList.toggle('done-card',done[id]);
}

// Safe lookup map so we never put raw strings in onclick
const ASGN_MAP = {};
CANVAS_DATA.forEach(a => {
  const safeId = a.id.replace(/[^a-zA-Z0-9]/g,'_');
  ASGN_MAP[safeId] = a;
});

async function summarize(safeId) {
  const a = ASGN_MAP[safeId];
  if (!a) return;
  const sumEl = document.getElementById(`sum-${safeId}`);
  const btn = document.getElementById(`sumbtn-${safeId}`);
  if (!sumEl) return;
  sumEl.className = 'asgn-summary loading visible';
  sumEl.textContent = 'summarizing...';
  if (btn) btn.style.display = 'none';
  try {
    const res = await fetch('https://soln0m-proxy.solomon02162007.workers.dev', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role:'user', content:`Summarize this college assignment in 2-3 short bullet points. Be practical — what needs to be done, key requirements, rough difficulty. Under 80 words total.\n\nAssignment: ${a.name}\n${a.desc?'Details: '+a.desc:'No details available.'}`}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || 'Could not summarize.';
    sumEl.className = 'asgn-summary visible';
    sumEl.innerHTML = text.replace(/\n/g,'<br>');
  } catch(e) {
    sumEl.className = 'asgn-summary visible';
    sumEl.textContent = 'Could not load summary.';
    if (btn) btn.style.display = 'inline-block';
  }
}
